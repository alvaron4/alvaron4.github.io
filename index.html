<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Loop Player</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #111;
      --accent: #e8ff47;
      --text: #f0f0f0;
      --muted: #555;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(2rem, 6vw, 4rem);
      letter-spacing: -2px;
      line-height: 1;
      margin-bottom: 0.2em;
    }

    h1 span { color: var(--accent); }

    .subtitle {
      color: var(--muted);
      font-size: 0.75rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 2.5rem;
    }

    .input-row {
      display: flex;
      gap: 0.5rem;
      width: 100%;
      max-width: 640px;
      margin-bottom: 1.5rem;
    }

    input {
      flex: 1;
      background: var(--surface);
      border: 1px solid #2a2a2a;
      color: var(--text);
      font-family: 'Space Mono', monospace;
      font-size: 0.85rem;
      padding: 0.75rem 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus { border-color: var(--accent); }
    input::placeholder { color: var(--muted); }

    button {
      background: var(--accent);
      color: #000;
      border: none;
      font-family: 'Space Mono', monospace;
      font-weight: 700;
      font-size: 0.8rem;
      padding: 0.75rem 1.2rem;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: opacity 0.15s;
    }

    button:hover { opacity: 0.85; }

    .player-wrapper {
      width: 100%;
      max-width: 640px;
      aspect-ratio: 16/9;
      background: var(--surface);
      border: 1px solid #1e1e1e;
      display: none;
      position: relative;
    }

    .player-wrapper.visible { display: block; }

    #player {
      width: 100%;
      height: 100%;
    }

    .tag {
      position: absolute;
      top: -1px;
      right: -1px;
      background: var(--accent);
      color: #000;
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 2px;
      padding: 2px 6px;
      text-transform: uppercase;
    }

    .error {
      color: #ff5e5e;
      font-size: 0.75rem;
      margin-top: -0.8rem;
      margin-bottom: 1rem;
      display: none;
    }
  </style>
</head>
<body>

  <h1>LOOP<span>.</span></h1>
  <p class="subtitle">YouTube en bucle infinito</p>

  <div class="input-row">
    <input type="text" id="urlInput" placeholder="Pega el link de YouTube aquí..." />
    <button onclick="cargar()">Play</button>
  </div>

  <p class="error" id="error">URL inválida. Usa un link de YouTube normal.</p>

  <div class="player-wrapper" id="wrapper">
    <span class="tag">∞ loop</span>
    <div id="player"></div>
  </div>

  <script>
    var tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    document.head.appendChild(tag);

    var player;

    function onYouTubeIframeAPIReady() {
      // API lista, esperamos input del usuario
    }

    function extraerID(url) {
      try {
        var u = new URL(url);
        if (u.hostname.includes('youtu.be')) return u.pathname.slice(1);
        return u.searchParams.get('v');
      } catch(e) { return null; }
    }

    function cargar() {
      var url = document.getElementById('urlInput').value.trim();
      var id = extraerID(url);
      var err = document.getElementById('error');
      var wrapper = document.getElementById('wrapper');

      if (!id) {
        err.style.display = 'block';
        wrapper.classList.remove('visible');
        return;
      }

      err.style.display = 'none';
      wrapper.classList.add('visible');

      if (player) {
        player.loadVideoById(id);
      } else {
        player = new YT.Player('player', {
          videoId: id,
          playerVars: { autoplay: 1, loop: 1, playlist: id, rel: 0, modestbranding: 1 },
          events: { onStateChange: onStateChange }
        });
      }
    }

    function onStateChange(e) {
      // loop: 1 + playlist debería ser suficiente, pero por si acaso:
      if (e.data === YT.PlayerState.ENDED) player.playVideo();
    }

    document.getElementById('urlInput').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') cargar();
    });
  </script>
</body>
</html>
