<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Loop Player</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .layout {
      display: grid;
      grid-template-columns: 120px 40vw 120px;
      grid-template-rows: 120px auto 120px;
      align-items: center;
      justify-items: center;
      gap: 12px;
    }
    .gif-top    { grid-column: 2; grid-row: 1; }
    .gif-left   { grid-column: 1; grid-row: 2; }
    .video-wrap { grid-column: 2; grid-row: 2; width: 40vw; aspect-ratio: 16/9; position: relative; }
    .gif-right  { grid-column: 3; grid-row: 2; }
    .gif-bottom { grid-column: 2; grid-row: 3; }

    .layout img {
      width: 110px;
      height: 110px;
      object-fit: cover;
    }

    video {
      width: 100%;
      height: 100%;
      display: block;
    }

    canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 10;
    }
  </style>
</head>
<body>
  <canvas id="fx"></canvas>
  <div class="layout">
    <img class="gif-top"    id="gif-top"    src="iltak-high-school-boy.gif" alt="">
    <img class="gif-left"   id="gif-left"   src="ghost-avenue-ghost-avenue-liln.gif" alt="">
    <div class="video-wrap" id="wrap">
      <video id="vid" loop autoplay>
        <source src="ゴーストアベニュー(Ghost Avenue) - Eve Music Video.mp4" type="video/mp4">
      </video>
    </div>
    <img class="gif-right"  id="gif-right"  src="rimuru-tempest-rimuru.gif" alt="">
    <img class="gif-bottom" id="gif-bottom" src="subaru-natsuki-subaru.gif" alt="">
  </div>

  <script>
    const vid = document.getElementById('vid');
    const wrap = document.getElementById('wrap');
    const canvas = document.getElementById('fx');
    const ctx = canvas.getContext('2d');

    const gifTop    = document.getElementById('gif-top');    // iltak - shake
    const gifLeft   = document.getElementById('gif-left');   // ghost avenue - shake
    const gifRight  = document.getElementById('gif-right');  // rimuru - left/right
    const gifBottom = document.getElementById('gif-bottom'); // subaru - up/down

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });

    let analyser, dataArray;

    vid.addEventListener('play', () => {
      const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const source = audioCtx.createMediaElementSource(vid);
      analyser = audioCtx.createAnalyser();
      analyser.fftSize = 256;
      source.connect(analyser);
      analyser.connect(audioCtx.destination);
      dataArray = new Uint8Array(analyser.frequencyBinCount);
      draw();
    }, { once: true });

    function avg(arr, start, end) {
      const slice = arr.slice(start, end);
      return slice.reduce((a, b) => a + b, 0) / slice.length / 255;
    }

    function draw() {
      requestAnimationFrame(draw);
      if (!analyser) return;

      analyser.getByteFrequencyData(dataArray);

      const bass   = avg(dataArray, 0, 8);    // bajo
      const treble = avg(dataArray, 20, 40);  // altos
      const mid    = avg(dataArray, 8, 20);   // medios

      // --- Video: shake + glow border ---
      const shake = bass * 8;
      const dx = (Math.random() - 0.5) * shake;
      const dy = (Math.random() - 0.5) * shake;
      wrap.style.transform = `translate(${dx}px, ${dy}px)`;

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      const rect = wrap.getBoundingClientRect();
      const glow = bass * 40;
      const hue = 200 + bass * 160;
      ctx.strokeStyle = `hsla(${hue}, 100%, 70%, ${0.3 + bass * 0.7})`;
      ctx.lineWidth = 2 + bass * 8;
      ctx.shadowColor = `hsla(${hue}, 100%, 70%, 1)`;
      ctx.shadowBlur = glow * 2;
      ctx.strokeRect(rect.left - glow/2, rect.top - glow/2, rect.width + glow, rect.height + glow);

      // --- gif-top (iltak): shake con el bajo ---
      const shakeTop = bass * 10;
      gifTop.style.transform = `translate(${(Math.random()-0.5)*shakeTop}px, ${(Math.random()-0.5)*shakeTop}px)`;

      // --- gif-left (ghost avenue): shake con los altos ---
      const shakeLeft = treble * 10;
      gifLeft.style.transform = `translate(${(Math.random()-0.5)*shakeLeft}px, ${(Math.random()-0.5)*shakeLeft}px)`;

      // --- gif-right (rimuru): izquierda a derecha con medios ---
      const lrAmt = Math.sin(Date.now() / 80) * mid * 18;
      gifRight.style.transform = `translateX(${lrAmt}px)`;

      // --- gif-bottom (subaru): arriba abajo con bajo ---
      const udAmt = Math.sin(Date.now() / 80) * bass * 18;
      gifBottom.style.transform = `translateY(${udAmt}px)`;
    }
  </script>
</body>
</html>
